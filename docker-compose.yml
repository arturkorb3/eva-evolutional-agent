# EVA secure sandbox.
#
# Preferred usage is via the wrappers:   .\run.ps1 <cmd>   /   ./run.sh <cmd>
# Or directly:                           docker compose run --rm eva <organism args>
#
# Why a sandbox: EVA can run arbitrary shell commands, rewrite its own source
# and promote new versions of itself. The hardening below contains a misbehaving
# (or autonomous) agent to this container and the three bind mounts only.

services:
  eva:
    build: .
    image: eva:latest
    init: true # proper PID 1, reaps child processes spawned by the shell action

    # ---------------------------------------------------------------------
    # Isolation / hardening
    # ---------------------------------------------------------------------
    read_only: true # immutable root filesystem; only the mounts + tmpfs below are writable
    cap_drop:
      - ALL # drop every Linux capability
    security_opt:
      - no-new-privileges:true # block setuid-based privilege escalation
    user: "10001:10001" # never run as root
    deploy:
      resources:
        limits:
          cpus: "1.5" # cap CPU
          memory: 1g # cap memory
          pids: 256 # contain fork bombs from the shell action

    tmpfs:
      - /tmp:size=256m,mode=1777 # writable scratch space without touching the host

    # Allow reaching a model server running on the host (Ollama / LM Studio),
    # also on Linux. On Docker Desktop this name resolves automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Writable, PERSISTENT HOME so EVA can extend its OWN runtime tooling inside
      # the sandbox without any image change: `pip install --user <pkg>` and
      # downloaded binaries land under ~/.local (= /eva/.local/.local -> ./data/local)
      # and survive restarts. ~/.local/bin is on PATH.
      HOME: "/eva/.local"
      PATH: "/eva/.local/.local/bin:/eva/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      # EVA runs INSIDE the sandbox here: it cannot read the host clipboard, so the
      # clipboard bridge falls back to host-staged files (run.ps1 /paste watcher).
      EVA_IN_CONTAINER: "1"
      # Provider selection for EVA's ModelAdapter. Set these in .env.
      EVA_PROVIDER: "${EVA_PROVIDER:-openai_chat}"
      EVA_ENDPOINT: "${EVA_ENDPOINT:-}"
      EVA_MODEL: "${EVA_MODEL:-}"
      EVA_API_KEY: "${EVA_API_KEY:-}"
      EVA_TOOL_MODE: "${EVA_TOOL_MODE:-native}"
      EVA_TEMPERATURE: "${EVA_TEMPERATURE:-}"
      # Legacy fallbacks (used only if the EVA_* vars above are unset).
      LLM_ENDPOINT: "${LLM_ENDPOINT:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_TIMEOUT: "${LLM_TIMEOUT:-}"
      # Context budget + pivot threshold.
      ORGANISM_HISTORY_BUDGET: "${ORGANISM_HISTORY_BUDGET:-}"
      ORGANISM_HISTORY_KEEP: "${ORGANISM_HISTORY_KEEP:-}"
      ORGANISM_PIVOT_THRESHOLD: "${ORGANISM_PIVOT_THRESHOLD:-}"
      # Optional autonomous mode. Only safe because this container contains it.
      ORGANISM_AUTO_YES: "${ORGANISM_AUTO_YES:-}"
      ORGANISM_ALLOW_SHELL: "${ORGANISM_ALLOW_SHELL:-}"
      # Display / TUI.
      EVA_TUI_FULL: "${EVA_TUI_FULL:-}"
      NO_COLOR: "${NO_COLOR:-}"

    # Persist + expose everything the organism evolves, on the host.
    # The kernel (organism.py) is intentionally NOT mounted, so the agent
    # cannot modify it.
    volumes:
      - ./data/runtime:/eva/runtime
      - ./data/state:/eva/state
      - ./data/workspace:/eva/workspace
      # Writable HOME for runtime-installed tools/libs (pip --user, binaries) so
      # EVA grows its own capabilities here without touching the image.
      - ./data/local:/eva/.local
      # Dev convenience: mount the seed read-only so genome edits take effect on a
      # reseed WITHOUT rebuilding the image. The image still bakes seed/ as the
      # distribution fallback (the mount just shadows it here).
      - ./seed:/eva/seed:ro

    # Needed for interactive approval prompts and API-key entry.
    stdin_open: true
    tty: true
