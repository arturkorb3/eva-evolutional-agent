<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | default: "EVA — Evolutional Agent" }}</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
    @media (max-width: 767px) { body { padding: 15px; } }
    .mermaid { text-align: center; background: transparent; }
  </style>
</head>
<body>
  <article class="markdown-body">
    {{ content }}
  </article>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    // GitHub Pages renders ```mermaid as a highlighted code block; convert those
    // into real Mermaid containers, then render them.
    document.querySelectorAll(".language-mermaid").forEach(function (el) {
      var pre = document.createElement("pre");
      pre.className = "mermaid";
      pre.textContent = el.textContent;
      el.replaceWith(pre);
    });
    mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "default" });
    mermaid.run({ querySelector: ".mermaid" });
  </script>
</body>
</html>
